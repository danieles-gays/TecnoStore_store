<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard — TecnoStore Almacén</title>
    <link rel="stylesheet" href="/css/main.css">
</head>
<body>
<div class="layout">
    <aside class="sidebar" id="sidebar"></aside>
    <div class="main">
        <header class="topbar">
            <span class="topbar-title">Dashboard</span>
        </header>
        <div class="content">
            <div class="stats-grid" id="stats-grid">
                <div class="stat-card"><div class="stat-icon blue">📦</div><div><div class="stat-value" id="stat-products">—</div><div class="stat-label">Productos totales</div></div></div>
                <div class="stat-card"><div class="stat-icon red">⚠️</div><div><div class="stat-value" id="stat-low-stock">—</div><div class="stat-label">Stock bajo (&lt;5)</div></div></div>
                <div class="stat-card"><div class="stat-icon green">👥</div><div><div class="stat-value" id="stat-users">—</div><div class="stat-label">Usuarios</div></div></div>
                <div class="stat-card"><div class="stat-icon amber">🔑</div><div><div class="stat-value" id="stat-tokens">—</div><div class="stat-label">Tokens API activos</div></div></div>
            </div>

            <div style="display:grid;grid-template-columns:1fr 1fr;gap:20px;">
                <div class="card">
                    <div class="card-header"><h2>Productos con stock bajo</h2></div>
                    <div class="table-wrap">
                        <table>
                            <thead><tr><th>SKU</th><th>Nombre</th><th>Stock</th></tr></thead>
                            <tbody id="low-stock-table"></tbody>
                        </table>
                    </div>
                </div>
                <div class="card">
                    <div class="card-header"><h2>Últimos movimientos de stock</h2></div>
                    <div class="table-wrap">
                        <table>
                            <thead><tr><th>Producto</th><th>Cantidad</th><th>Motivo</th><th>Fecha</th></tr></thead>
                            <tbody id="movements-table"></tbody>
                        </table>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

<script src="/js/app.js"></script>
<script>
    if (!requireAuth()) throw new Error();
    document.getElementById('sidebar').innerHTML = renderSidebar('dashboard');

    async function loadDashboard() {
        const [prodRes, tokenRes] = await Promise.all([
            apiFetch('/products'),
            isAdmin() ? apiFetch('/tokens') : Promise.resolve({ ok: true, data: [] })
        ]);

        const products = prodRes.ok ? prodRes.data : [];
        const tokens   = tokenRes.ok ? tokenRes.data : [];
        const lowStock = products.filter(p => p.stock < 5);

        document.getElementById('stat-products').textContent = products.length;
        document.getElementById('stat-low-stock').textContent = lowStock.length;
        document.getElementById('stat-tokens').textContent = tokens.length;

        if (isAdmin()) {
            const usersRes = await apiFetch('/users');
            document.getElementById('stat-users').textContent = usersRes.ok ? usersRes.data.length : '—';
        } else {
            document.getElementById('stat-users').textContent = '—';
        }

        const lowTable = document.getElementById('low-stock-table');
        lowTable.innerHTML = lowStock.length === 0
            ? '<tr><td colspan="3" class="text-muted" style="padding:20px;text-align:center;">Sin alertas de stock</td></tr>'
            : lowStock.map(p => `
                <tr>
                    <td><code>${p.sku}</code></td>
                    <td>${p.name}</td>
                    <td class="stock-low">${p.stock}</td>
                </tr>`).join('');

        // Últimos movimientos (obtenemos de los primeros 5 productos con movimientos)
        const movTable = document.getElementById('movements-table');
        movTable.innerHTML = '<tr><td colspan="4" class="text-muted" style="padding:20px;text-align:center;">Cargando...</td></tr>';

        const sample = products.slice(0, 10);
        const movRows = [];
        for (const p of sample) {
            const mRes = await apiFetch(`/products/${p.id}/movements`);
            if (mRes.ok && mRes.data.length > 0) {
                mRes.data.slice(0, 2).forEach(m => movRows.push({ ...m, productName: p.name }));
            }
            if (movRows.length >= 8) break;
        }

        movTable.innerHTML = movRows.length === 0
            ? '<tr><td colspan="4" class="text-muted" style="padding:20px;text-align:center;">Sin movimientos registrados</td></tr>'
            : movRows.map(m => `
                <tr>
                    <td>${m.productName}</td>
                    <td class="${m.quantity_change > 0 ? 'text-success' : 'text-danger'} fw-bold">
                        ${m.quantity_change > 0 ? '+' : ''}${m.quantity_change}
                    </td>
                    <td class="text-muted">${m.reason || '—'}</td>
                    <td class="text-muted">${formatDate(m.created_at)}</td>
                </tr>`).join('');
    }

    loadDashboard();
</script>
</body>
</html>
