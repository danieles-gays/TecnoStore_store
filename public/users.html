<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Usuarios — TecnoStore Almacén</title>
    <link rel="stylesheet" href="/css/main.css">
</head>
<body>
<div class="layout">
    <aside class="sidebar" id="sidebar"></aside>
    <div class="main">
        <header class="topbar">
            <span class="topbar-title">Gestión de Usuarios</span>
            <div class="topbar-actions">
                <button class="btn btn-primary btn-sm" onclick="openNewUser()">+ Nuevo usuario</button>
            </div>
        </header>
        <div class="content">
            <div id="alert-container"></div>
            <div class="card">
                <div class="card-header"><h2>Usuarios del sistema</h2></div>
                <div class="table-wrap">
                    <table>
                        <thead>
                            <tr><th>ID</th><th>Usuario</th><th>Email</th><th>Rol</th><th>Alta</th><th>Acciones</th></tr>
                        </thead>
                        <tbody id="users-table"></tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>
</div>

<div class="modal-overlay" id="modal-user">
    <div class="modal">
        <div class="modal-header">
            <h3 id="modal-title">Nuevo usuario</h3>
            <button class="modal-close" onclick="closeModal('modal-user')">✕</button>
        </div>
        <div class="modal-body">
            <input type="hidden" id="user-id">
            <div class="form-grid-2">
                <div class="form-group">
                    <label class="form-label">Usuario *</label>
                    <input type="text" id="user-username" class="form-control" placeholder="nombre_usuario">
                </div>
                <div class="form-group">
                    <label class="form-label">Rol</label>
                    <select id="user-role" class="form-control">
                        <option value="user">user</option>
                        <option value="admin">admin</option>
                    </select>
                </div>
            </div>
            <div class="form-group">
                <label class="form-label">Email *</label>
                <input type="email" id="user-email" class="form-control" placeholder="usuario@tecnostore.local">
            </div>
            <div class="form-group">
                <label class="form-label" id="pass-label">Contraseña *</label>
                <input type="password" id="user-password" class="form-control" placeholder="Contraseña">
            </div>
        </div>
        <div class="modal-footer">
            <button class="btn btn-ghost" onclick="closeModal('modal-user')">Cancelar</button>
            <button class="btn btn-primary" onclick="saveUser()">Guardar</button>
        </div>
    </div>
</div>

<script src="/js/app.js"></script>
<script>
    if (!requireAuth()) throw new Error();
    if (!isAdmin()) window.location.href = '/dashboard.html';
    document.getElementById('sidebar').innerHTML = renderSidebar('users');

    async function loadUsers() {
        const r = await apiFetch('/users');
        const tbody = document.getElementById('users-table');
        if (!r.ok) { tbody.innerHTML = `<tr><td colspan="6" class="text-danger" style="padding:20px;text-align:center;">${r.data.error}</td></tr>`; return; }

        const me = getUser();
        tbody.innerHTML = r.data.map(u => `
            <tr>
                <td class="text-muted">${u.id}</td>
                <td class="fw-bold">${u.username} ${u.id === me.id ? '<span class="badge badge-blue">Tú</span>' : ''}</td>
                <td>${u.email}</td>
                <td><span class="badge ${u.role === 'admin' ? 'badge-red' : 'badge-gray'}">${u.role}</span></td>
                <td class="text-muted">${formatDate(u.created_at)}</td>
                <td>
                    <div class="d-flex gap-2">
                        <button class="btn btn-ghost btn-sm" onclick='editUser(${JSON.stringify(u)})'>Editar</button>
                        ${u.id !== me.id ? `<button class="btn btn-danger btn-sm" onclick="deleteUser(${u.id})">Eliminar</button>` : ''}
                    </div>
                </td>
            </tr>`).join('');
    }

    function openNewUser() {
        document.getElementById('modal-title').textContent = 'Nuevo usuario';
        document.getElementById('user-id').value = '';
        document.getElementById('user-username').value = '';
        document.getElementById('user-email').value = '';
        document.getElementById('user-password').value = '';
        document.getElementById('user-role').value = 'user';
        document.getElementById('pass-label').textContent = 'Contraseña *';
        openModal('modal-user');
    }

    function editUser(u) {
        document.getElementById('modal-title').textContent = 'Editar usuario';
        document.getElementById('user-id').value = u.id;
        document.getElementById('user-username').value = u.username;
        document.getElementById('user-email').value = u.email;
        document.getElementById('user-password').value = '';
        document.getElementById('user-role').value = u.role;
        document.getElementById('pass-label').textContent = 'Nueva contraseña (dejar vacío para no cambiar)';
        openModal('modal-user');
    }

    async function saveUser() {
        const id = document.getElementById('user-id').value;
        const body = {
            username: document.getElementById('user-username').value.trim(),
            email:    document.getElementById('user-email').value.trim(),
            role:     document.getElementById('user-role').value,
        };
        const pass = document.getElementById('user-password').value;
        if (pass) body.password = pass;

        if (!id && !pass) return showAlert('alert-container', 'La contraseña es obligatoria para nuevos usuarios.');

        const r = id
            ? await apiFetch('/users/' + id, { method: 'PUT', body: JSON.stringify(body) })
            : await apiFetch('/users', { method: 'POST', body: JSON.stringify(body) });

        if (!r.ok) return showAlert('alert-container', r.data.error || 'Error al guardar.');
        closeModal('modal-user');
        showAlert('alert-container', 'Usuario guardado.', 'success');
        loadUsers();
    }

    async function deleteUser(id) {
        if (!confirm('¿Eliminar este usuario?')) return;
        const r = await apiFetch('/users/' + id, { method: 'DELETE' });
        if (!r.ok) return showAlert('alert-container', r.data.error || 'Error.');
        showAlert('alert-container', 'Usuario eliminado.', 'success');
        loadUsers();
    }

    loadUsers();
</script>
</body>
</html>
